<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS: English Initiator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (Version 18) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Compiles JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        init: {
                            dark: '#000000',      // Absolute Black
                            card: '#121212',      // Spotify Dark
                            border: '#282828',    // Subtle Border
                            primary: '#1ed760',   // Neon Green (Spotify style)
                            accent: '#ffffff'     // White
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-init-dark text-white overflow-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- DATA SOURCE: 25 EXERCISES (LEVEL A0 - ABSOLUTE BEGINNERS) ---

        const GREETINGS_HUNT = [
            { context: "To say 'Hello' to someone in a simple way.", q: "Choose the correct word:", answer: "Hello", options: ["Hello", "Goodbye", "Please", "Thanks"] },
            { context: "To greet someone early in the morning.", q: "Complete: Good ___!", answer: "morning", options: ["night", "morning", "afternoon", "evening"] },
            { context: "When we meet someone for the first time.", q: "Complete: Nice to ___ you.", answer: "meet", options: ["see", "meet", "look", "talk"] },
            { context: "To ask how someone is doing.", q: "Complete: How are ___?", answer: "you", options: ["I", "he", "you", "they"] },
            { context: "To answer that everything is fine.", q: "Complete: I am ___, thank you.", answer: "fine", options: ["bad", "sad", "fine", "angry"] }
        ];

        const VERB_TO_BE_MATRIX = [
            { context: "To say your own name.", q: "___ am Anna.", answer: "I", options: ["You", "I", "He", "She"] },
            { context: "To talk to the person in front of you.", q: "___ are Peter.", answer: "You", options: ["I", "He", "You", "It"] },
            { context: "Using the contracted (short) form of 'I am'.", q: "Complete: ___ Anna.", answer: "I'm", options: ["I'm", "You're", "I is", "Am I"] },
            { context: "Using the contracted form of 'You are'.", q: "Complete: ___ Peter.", answer: "You're", options: ["I'm", "You's", "You're", "Are you"] },
            { context: "Another way to say 'I am John'.", q: "Complete: My ___ is John.", answer: "name", options: ["name", "call", "word", "hello"] }
        ];

        const ALPHABET_DECODE = [
            { context: "The first letters of the alphabet.", q: "A, B, C, ___", answer: "D", options: ["E", "F", "D", "G"] },
            { context: "To ask someone to say the letters of their name.", q: "How do you ___ your name?", answer: "spell", options: ["say", "spell", "speak", "talk"] },
            { context: "Putting the letters together: T - O - M.", q: "What is the name?", answer: "Tom", options: ["Tim", "Tom", "Sam", "Bob"] },
            { context: "The last letters of the alphabet.", q: "X, Y, ___", answer: "Z", options: ["W", "V", "U", "Z"] },
            { context: "Spelling the word 'DOG'.", q: "D - ___ - G", answer: "O", options: ["A", "E", "I", "O"] }
        ];

        const INTRODUCTION_LOG = [
            { 
                text: "Hello! I am Maria. What is your name?\n(1) ____! I (2) ____ Maria. What is your name?",
                blanks: [
                    { id: 1, correct: "Hello", options: ["Hello", "Goodbye"] },
                    { id: 2, correct: "am", options: ["am", "are"] }
                ]
            },
            { 
                text: "My name is João. Nice to meet you.\nMy (1) ____ is João. Nice to (2) ____ you.",
                blanks: [
                    { id: 1, correct: "name", options: ["name", "spell"] },
                    { id: 2, correct: "meet", options: ["meet", "see"] }
                ]
            },
            { 
                text: "How do you spell that? J-O-A-O.\nHow (1) ____ you (2) ____ that? J-O-A-O.",
                blanks: [
                    { id: 1, correct: "do", options: ["do", "are"] },
                    { id: 2, correct: "spell", options: ["spell", "speak"] }
                ]
            },
            { 
                text: "How are you? I am fine, thank you.\nHow (1) ____ you? I am (2) ____, thank you.",
                blanks: [
                    { id: 1, correct: "are", options: ["are", "am"] },
                    { id: 2, correct: "fine", options: ["fine", "bad"] }
                ]
            },
            { 
                text: "Good morning! Are you the Teacher?\n(1) ____ morning! (2) ____ you the Teacher?",
                blanks: [
                    { id: 1, correct: "Good", options: ["Good", "Nice"] },
                    { id: 2, correct: "Are", options: ["Are", "Am"] }
                ]
            }
        ];

        const VOCAL_MISSION = [
            { title: "Saying Hello", context: "Greet someone and say your name.", starter: "Hello! My name is..." },
            { title: "Spelling Your Name", context: "Say how to spell your first name.", starter: "I spell my name: _ - _ - _" },
            { title: "Being Polite", context: "Say it was nice to meet the person.", starter: "Nice to meet you!" },
            { title: "Asking for a Name", context: "Ask someone what their name is.", starter: "What is your name?" },
            { title: "Asking for Letters", context: "Ask the person to spell their name.", starter: "How do you spell that?" }
        ];

        const LAB_DATA = [
            { id: "ACT-01", title: "First Contact", icon: "fas fa-hand-paper", description: "Learn basic greetings: Hello, Hi, Good morning.", tracks: GREETINGS_HUNT, type: "decoder" },
            { id: "ACT-02", title: "The Identity", icon: "fas fa-id-badge", description: "Master I am and You are (Verb To Be).", tracks: VERB_TO_BE_MATRIX, type: "decoder" },
            { id: "ACT-03", title: "The Alphabet", icon: "fas fa-spell-check", description: "Practice spelling and letters in English.", tracks: ALPHABET_DECODE, type: "decoder" },
            { id: "ACT-04", title: "Quick Dialogue", icon: "fas fa-comments", description: "Complete your first real conversation in English.", tracks: INTRODUCTION_LOG, type: "cloze" },
            { id: "ACT-05", title: "Vocal Mission", icon: "fas fa-microphone-alt", description: "Speak English out loud for the first time!", tracks: VOCAL_MISSION, type: "speaking" }
        ];

        // --- MAIN COMPONENT ---

        function App() {
            const [view, setView] = useState('home'); 
            const [activeActIndex, setActiveActIndex] = useState(0);
            const [currentStep, setCurrentStep] = useState(0);
            const [score, setScore] = useState(0);
            
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [clozeSelections, setClozeSelections] = useState({});
            const [isAnswerVerified, setIsAnswerVerified] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [toast, setToast] = useState({ show: false, msg: '', type: 'success' });

            const activeActivity = useMemo(() => LAB_DATA[activeActIndex], [activeActIndex]);
            const currentTrack = useMemo(() => activeActivity.tracks[currentStep], [activeActivity, currentStep]);

            const showToast = (msg, type = 'success') => {
                setToast({ show: true, msg, type });
                setTimeout(() => setToast({ show: false, msg: '', type: 'success' }), 2500);
            };

            const startExercise = (index) => {
                setActiveActIndex(index);
                setCurrentStep(0);
                resetState();
                setView('exercise');
            };

            const resetState = () => {
                setSelectedAnswer(null);
                setClozeSelections({});
                setIsAnswerVerified(false);
                setIsRecording(false);
                setIsProcessing(false);
            };

            const verifyAnswer = () => {
                if (activeActivity.type === 'decoder') {
                    if (selectedAnswer === currentTrack.answer) {
                        setScore(s => s + 100);
                        showToast("CORRECT! +100 XP", 'success');
                        setIsAnswerVerified(true);
                    } else {
                        showToast("ERROR: TRY AGAIN.", 'error');
                    }
                } else if (activeActivity.type === 'cloze') {
                    const isCorrect = currentTrack.blanks.every(b => clozeSelections[b.id] === b.correct);
                    if (isCorrect) {
                        setScore(s => s + 200);
                        showToast("DIALOGUE COMPLETE! +200 XP", 'success');
                        setIsAnswerVerified(true);
                    } else {
                        showToast("THERE IS AN ERROR IN THE WORDS.", 'error');
                    }
                } else {
                    setIsProcessing(true);
                    setTimeout(() => {
                        setIsProcessing(false);
                        setScore(s => s + 300);
                        showToast("VOICE RECORDED! +300 XP", 'success');
                        setIsAnswerVerified(true);
                    }, 1500);
                }
            };

            const nextStep = () => {
                if (currentStep + 1 < activeActivity.tracks.length) {
                    setCurrentStep(s => s + 1);
                    resetState();
                } else {
                    setView('completion');
                }
            };

            return (
                <div className="min-h-screen font-sans bg-init-dark text-white selection:bg-init-primary/30">
                    {/* SPOTIFY STYLE BACKGROUND */}
                    <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                        <div className="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-init-primary/20 blur-[180px] rounded-full"></div>
                        <div className="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-init-primary/10 blur-[150px] rounded-full"></div>
                    </div>

                    <div className="flex h-screen relative z-10">
                        {/* SIDEBAR */}
                        <aside className="w-72 bg-black/40 backdrop-blur-xl border-r border-white/5 flex flex-col justify-between hidden md:flex h-full shadow-2xl z-20">
                            <div>
                                <div className="p-8 border-b border-white/5">
                                    <h1 className="text-3xl font-black tracking-tighter flex items-center gap-3 text-white">
                                        <i className="fas fa-layer-group text-init-primary"></i> WOLF LABS
                                    </h1>
                                    <p className="text-[10px] font-bold text-init-primary uppercase tracking-[0.2em] mt-2">Beginner Level</p>
                                </div>
                                <nav className="px-4 space-y-2 mt-6 text-left">
                                    <button onClick={() => view !== 'home' && setView('home')} className={`w-full flex items-center gap-4 px-4 py-3 font-bold rounded-xl transition-all ${view === 'home' || view === 'completion' ? 'bg-init-primary/20 text-white border border-init-primary/30' : 'text-gray-500 hover:text-white hover:bg-white/5'}`}>
                                        <i className={`fas fa-home ${view === 'home' ? "text-init-primary" : ""}`}></i>
                                        Home Page
                                    </button>
                                    <button className="w-full flex items-center gap-4 px-4 py-3 font-bold text-gray-500 hover:text-white rounded-xl hover:bg-white/5 transition-all">
                                        <i className="fas fa-chart-line"></i>
                                        My Progress
                                    </button>
                                </nav>
                            </div>
                            <div className="p-4 border-t border-white/5">
                                <div className="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center gap-4 hover:border-init-primary/50 transition-all cursor-pointer">
                                    <div className="w-10 h-10 rounded-full bg-init-primary flex items-center justify-center text-black font-black shadow-[0_0_15px_rgba(30,215,96,0.4)]">
                                        <i className="fas fa-rocket"></i>
                                    </div>
                                    <div className="flex-1 overflow-hidden text-left">
                                        <p className="text-sm font-bold text-white truncate">Student_A0</p>
                                        <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Mission 1</p>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* MAIN AREA */}
                        <main className="flex-1 flex flex-col bg-transparent relative overflow-hidden h-full">
                            
                            {/* HOME PAGE */}
                            {view === 'home' && (
                                <div className="flex-1 overflow-y-auto p-8 lg:p-12 animate-in fade-in duration-700">
                                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6 text-left">
                                        <div>
                                            <p className="text-init-primary font-bold tracking-widest uppercase text-xs mb-3 flex items-center gap-2">
                                                <i className="fas fa-circle text-[8px] animate-pulse"></i> PRE-A1 PROTOCOL ACTIVE
                                            </p>
                                            <h2 className="text-5xl md:text-6xl font-black tracking-tight text-white mb-4 drop-shadow-lg">English Initiator</h2>
                                            <p className="text-gray-400 text-lg max-w-2xl leading-relaxed">Welcome to your first English mission! Learn how to greet, introduce yourself, and spell your name.</p>
                                        </div>
                                        <div className="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl px-8 py-6 text-center min-w-[180px] shadow-lg relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-full h-1 bg-init-primary"></div>
                                            <p className="text-xs text-gray-500 uppercase tracking-[0.2em] mb-1 font-bold">XP Points</p>
                                            <p className="text-4xl font-black text-white">{score}</p>
                                        </div>
                                    </header>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-6 pb-20">
                                        {LAB_DATA.map((act, idx) => (
                                            <div key={act.id} onClick={() => startExercise(idx)} className="group bg-init-card border border-init-border hover:border-init-primary/80 hover:-translate-y-2 rounded-3xl p-6 transition-all duration-300 cursor-pointer relative overflow-hidden flex flex-col justify-between min-h-[260px] shadow-lg">
                                                <div className="absolute top-[-50px] right-[-50px] w-32 h-32 bg-init-primary/5 rounded-full blur-2xl group-hover:bg-init-primary/20 transition-all"></div>
                                                <div className="relative z-10 text-left">
                                                    <div className="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-init-primary group-hover:bg-init-primary group-hover:text-black mb-6 transition-all text-xl shadow-md group-hover:shadow-[0_0_20px_rgba(30,215,96,0.6)]">
                                                        <i className={act.icon}></i>
                                                    </div>
                                                    <h3 className="text-xl font-bold mb-2 text-white">{act.title}</h3>
                                                    <p className="text-xs text-gray-400 leading-relaxed">{act.description}</p>
                                                </div>
                                                <div className="flex justify-between items-center text-[9px] font-bold text-gray-500 uppercase tracking-widest border-t border-init-border pt-4 mt-6">
                                                    <span><i className="fas fa-layer-group mr-1"></i> {act.tracks.length} Stages</span>
                                                    <span className="text-init-primary">A0 Level</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* EXERCISE SCREEN */}
                            {view === 'exercise' && (
                                <div className="flex-1 flex flex-col h-full animate-in fade-in duration-500">
                                    <header className="p-6 border-b border-init-border bg-init-card/80 backdrop-blur-xl flex items-center justify-between z-20">
                                        <div className="flex items-center gap-6 w-1/3 text-left">
                                            <button onClick={() => setView('home')} className="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-gray-400 hover:text-black hover:border-init-primary hover:bg-init-primary transition-all">
                                                <i className="fas fa-arrow-left"></i>
                                            </button>
                                            <div className="hidden sm:block">
                                                <p className="text-[10px] text-init-primary uppercase tracking-[0.2em] font-bold">{activeActivity.id}</p>
                                                <p className="font-bold text-sm text-white">{activeActivity.title}</p>
                                            </div>
                                        </div>

                                        <div className="w-1/3 flex flex-col items-center">
                                            <div className="flex justify-between w-full max-w-[250px] text-[10px] text-gray-500 mb-2 font-bold uppercase tracking-widest">
                                                <span>Step 0{currentStep + 1} of 0{activeActivity.tracks.length}</span>
                                            </div>
                                            <div className="w-full max-w-[250px] h-2 bg-white/5 rounded-full overflow-hidden">
                                                <div className="h-full bg-init-primary transition-all duration-700 ease-out shadow-[0_0_10px_rgba(30,215,96,0.5)]" style={{ width: `${((currentStep + 1) / activeActivity.tracks.length) * 100}%` }}></div>
                                            </div>
                                        </div>

                                        <div className="w-1/3 text-right">
                                            <span className="bg-white/5 border border-white/10 px-4 py-2 rounded-full text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                                XP: <span className="text-init-primary ml-1">{score}</span>
                                            </span>
                                        </div>
                                    </header>

                                    <div className="flex-1 overflow-y-auto flex flex-col justify-center p-6 pb-40 relative z-10">
                                        <div className="w-full flex justify-center">
                                            
                                            {/* MULTIPLE CHOICE */}
                                            {activeActivity.type === 'decoder' && (
                                                <div className="w-full max-w-4xl flex flex-col items-center gap-10">
                                                    <div className="flex flex-col md:flex-row gap-6 w-full">
                                                        <div className="flex-1 bg-white/5 border border-white/10 rounded-3xl p-8 text-left relative overflow-hidden backdrop-blur-sm">
                                                            <p className="text-init-primary font-bold text-[10px] uppercase mb-4 tracking-[0.2em] flex items-center gap-2"><i className="fas fa-info-circle"></i> Explanation</p>
                                                            <h2 className="text-xl sm:text-2xl font-medium text-gray-300 leading-relaxed">{currentTrack.context}</h2>
                                                        </div>
                                                        <div className="flex-1 bg-init-card border border-init-border rounded-3xl p-8 text-left shadow-lg">
                                                            <p className="text-gray-400 font-bold text-[10px] uppercase mb-4 tracking-[0.2em] flex items-center gap-2"><i className="fas fa-question-circle"></i> English</p>
                                                            <h2 className="text-2xl sm:text-3xl font-bold text-white leading-relaxed">
                                                                {currentTrack.q.replace('___', selectedAnswer || '____')}
                                                            </h2>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full">
                                                        {currentTrack.options.map(opt => (
                                                            <button key={opt} onClick={() => !isAnswerVerified && setSelectedAnswer(opt)} className={`p-6 rounded-2xl font-bold uppercase tracking-wider transition-all border-2 text-sm sm:text-base ${selectedAnswer === opt ? 'bg-init-primary border-init-primary text-black shadow-[0_0_20px_rgba(30,215,96,0.4)]' : 'bg-black/50 border-white/10 text-gray-300 hover:text-white hover:border-init-primary/50'}`}>
                                                                {opt}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {/* FILL IN THE BLANKS (CLOZE) */}
                                            {activeActivity.type === 'cloze' && (
                                                <div className="w-full max-w-4xl bg-init-card border border-init-border rounded-3xl p-10 shadow-2xl text-left relative overflow-hidden">
                                                    <div className="absolute top-0 right-0 w-64 h-64 bg-init-primary/5 rounded-full blur-3xl"></div>
                                                    <p className="text-init-primary font-bold text-[10px] uppercase mb-8 tracking-[0.2em] flex items-center gap-2"><i className="fas fa-comments"></i> Practical Dialogue</p>
                                                    
                                                    {/* Show translation/context before English dialogue */}
                                                    <p className="text-gray-400 mb-6 text-sm sm:text-base italic">{currentTrack.text.split('\n')[0]}</p>
                                                    
                                                    <div className="text-2xl sm:text-4xl font-bold leading-[3.5rem] sm:leading-[5rem] text-white">
                                                        {currentTrack.text.split('\n')[1].split(/(\(\d\)\s____)/).map((part, i) => {
                                                            const match = part.match(/\((\d)\)\s____/);
                                                            if (match) {
                                                                const blankId = parseInt(match[1]);
                                                                const blank = currentTrack.blanks.find(b => b.id === blankId);
                                                                return (
                                                                    <span key={i} className="inline-flex mx-3 relative group">
                                                                        <select value={clozeSelections[blankId] || ""} onChange={(e) => setClozeSelections({...clozeSelections, [blankId]: e.target.value})} disabled={isAnswerVerified} className={`appearance-none bg-black border-b-4 px-4 sm:px-6 py-2 rounded-lg focus:outline-none transition-all font-black text-xl sm:text-3xl cursor-pointer ${clozeSelections[blankId] ? 'border-init-primary text-init-primary bg-init-primary/10' : 'border-gray-600 text-gray-400 hover:border-gray-300'}`}>
                                                                            <option value="" disabled>---</option>
                                                                            {blank.options.map(o => <option key={o} value={o}>{o}</option>)}
                                                                        </select>
                                                                        <i className="fas fa-chevron-down absolute right-3 top-1/2 transform -translate-y-1/2 text-xs text-gray-500 pointer-events-none"></i>
                                                                    </span>
                                                                );
                                                            }
                                                            return <span key={i}>{part}</span>;
                                                        })}
                                                    </div>
                                                </div>
                                            )}

                                            {/* VOCAL PRACTICE */}
                                            {activeActivity.type === 'speaking' && (
                                                <div className="w-full max-w-3xl flex flex-col items-center">
                                                    <div className="w-full bg-init-card border border-init-border rounded-3xl p-8 sm:p-12 mb-10 text-center shadow-2xl relative overflow-hidden">
                                                        <div className="absolute top-[-50px] left-[-50px] w-40 h-40 bg-init-primary/10 rounded-full blur-3xl"></div>
                                                        <p className="text-[10px] text-init-primary uppercase font-bold mb-6 tracking-[0.2em] flex items-center justify-center gap-2"><i className="fas fa-volume-up"></i> {currentTrack.title}</p>
                                                        <h2 className="text-xl sm:text-2xl font-medium text-gray-300 mb-10 leading-relaxed text-left">{currentTrack.context}</h2>
                                                        <div className="bg-black/40 p-6 sm:p-8 rounded-2xl border border-white/5 text-left w-full border-l-4 border-l-init-primary">
                                                            <p className="text-[10px] text-gray-500 uppercase font-bold mb-3 tracking-widest">Say it out loud:</p>
                                                            <p className="text-2xl sm:text-4xl font-black text-white italic leading-snug">"{currentTrack.starter}"</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col items-center gap-6">
                                                        <button onClick={() => !isAnswerVerified && setIsRecording(!isRecording)} className={`w-28 h-28 sm:w-32 sm:h-32 rounded-full flex items-center justify-center transition-all duration-300 ${isRecording ? 'bg-red-500 animate-pulse shadow-[0_0_50px_rgba(239,68,68,0.5)] scale-110 text-white' : isAnswerVerified ? 'bg-init-primary text-black shadow-[0_0_30px_rgba(30,215,96,0.4)]' : 'bg-black border-4 border-init-primary text-init-primary hover:scale-105 hover:bg-init-primary/10'} text-4xl sm:text-5xl`}>
                                                            {isProcessing ? <i className="fas fa-circle-notch fa-spin"></i> : isAnswerVerified ? <i className="fas fa-check"></i> : <i className="fas fa-microphone"></i>}
                                                        </button>
                                                        <p className={`text-[10px] sm:text-xs font-bold tracking-[0.2em] uppercase ${isRecording ? 'text-red-400' : 'text-gray-500'}`}>{isRecording ? 'Recording Audio...' : isProcessing ? 'Analyzing...' : isAnswerVerified ? 'Audio Recorded' : 'Tap to Speak'}</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* BOTTOM ACTION BAR */}
                                    <div className="absolute bottom-0 w-full p-6 sm:p-8 bg-gradient-to-t from-[#000000] via-[#000000] to-transparent flex justify-center pb-8 sm:pb-12 z-40">
                                        {!isAnswerVerified ? (
                                            <button onClick={verifyAnswer} disabled={(!selectedAnswer && Object.keys(clozeSelections).length === 0 && !isRecording) || isProcessing} className="w-full max-w-lg py-5 sm:py-6 rounded-full bg-init-primary text-black font-black uppercase tracking-[0.2em] text-sm sm:text-base flex items-center justify-center gap-3 transition-all hover:bg-[#1ed760]/80 disabled:opacity-30 disabled:hover:bg-init-primary shadow-[0_10px_30px_rgba(30,215,96,0.2)] hover:scale-[1.02] hover:shadow-[0_10px_40px_rgba(30,215,96,0.4)]">
                                                Verify Answer <i className="fas fa-check-circle"></i>
                                            </button>
                                        ) : (
                                            <button onClick={nextStep} className="w-full max-w-lg py-5 sm:py-6 rounded-full bg-white text-black font-black uppercase tracking-[0.2em] text-sm sm:text-base flex items-center justify-center gap-3 transition-all hover:bg-gray-200 hover:scale-[1.02] shadow-[0_10px_30px_rgba(255,255,255,0.2)]">
                                                Next Stage <i className="fas fa-arrow-right"></i>
                                            </button>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* COMPLETION SCREEN */}
                            {view === 'completion' && (
                                <div className="flex-1 flex flex-col items-center justify-center relative p-6 text-center animate-in zoom-in-95 duration-700">
                                    <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(30,215,96,0.15)_0%,transparent_70%)] pointer-events-none"></div>
                                    <div className="relative z-10 max-w-2xl w-full">
                                        <div className="w-24 h-24 sm:w-32 sm:h-32 mx-auto rounded-full bg-init-primary/20 border-4 border-init-primary flex items-center justify-center mb-8 sm:mb-10 shadow-[0_0_50px_rgba(30,215,96,0.5)] text-4xl sm:text-6xl text-init-primary">
                                            <i className="fas fa-star"></i>
                                        </div>
                                        <h1 className="text-4xl sm:text-6xl font-black mb-4 sm:mb-6 tracking-tighter uppercase text-white drop-shadow-lg">Mission Accomplished!</h1>
                                        <p className="text-lg sm:text-2xl text-gray-400 mb-10 sm:mb-12 max-w-xl mx-auto leading-relaxed">Excellent job! You now know how to say Hello, your name, and how to spell it in English.</p>
                                        <div className="bg-init-card border border-init-border rounded-3xl p-8 sm:p-10 mb-10 sm:mb-12 flex justify-around shadow-2xl relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-init-primary"></div>
                                            <div className="text-center">
                                                <p className="text-[10px] sm:text-xs text-gray-500 uppercase tracking-[0.2em] mb-2 sm:mb-3 font-bold">Total XP</p>
                                                <p className="text-4xl sm:text-5xl font-black text-init-primary">+{score}</p>
                                            </div>
                                            <div className="w-px bg-init-border"></div>
                                            <div className="text-center">
                                                <p className="text-[10px] sm:text-xs text-gray-500 uppercase tracking-[0.2em] mb-2 sm:mb-3 font-bold">Level</p>
                                                <p className="text-4xl sm:text-5xl font-black text-white">Pre-A1</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setView('home')} className="w-full sm:w-auto px-12 py-5 sm:py-6 rounded-full bg-white/5 text-white font-black uppercase tracking-[0.2em] text-sm sm:text-base hover:bg-init-primary hover:text-black transition-all border border-white/10 hover:border-init-primary hover:shadow-[0_0_30px_rgba(30,215,96,0.3)]">Return to Home Page</button>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* TOAST NOTIFICATIONS */}
                    <div className={`fixed top-8 left-1/2 transform -translate-x-1/2 px-6 sm:px-10 py-4 sm:py-5 rounded-2xl sm:rounded-3xl font-bold shadow-[0_10px_40px_rgba(0,0,0,0.8)] transition-all duration-300 z-[100] flex items-center gap-3 sm:gap-4 border ${toast.show ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-10 pointer-events-none'} ${toast.type === 'success' ? 'bg-init-card text-white border-init-primary' : 'bg-red-900 text-white border-red-500'}`}>
                        {toast.type === 'success' ? <i className="fas fa-check-circle text-init-primary text-xl sm:text-2xl"></i> : <i className="fas fa-exclamation-triangle text-red-400 text-xl sm:text-2xl"></i>}
                        <span className="text-sm sm:text-lg uppercase tracking-[0.1em] sm:tracking-widest font-black">{toast.msg}</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
